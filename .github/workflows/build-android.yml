name: Build Android APK

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Build Debug APK
        working-directory: android
        run: |
          chmod +x gradlew
          # Run assembleDebug and catch EVERY bit of output
          ./gradlew assembleDebug --no-daemon --console=plain --info > build_full_log.txt 2>&1 || (tail -n 200 build_full_log.txt && exit 1)
          
          echo "### BUILD FINISHED ###"
          echo "Searching for APKs..."
          find . -name "*.apk"
          
          echo "Output directory structure:"
          ls -R app/build/outputs || echo "Outputs dir not found at expected path"

      - name: Upload APK Artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: ss-property-guru-debug
          path: "android/**/*.apk"
          if-no-files-found: error
          retention-days: 14

      - name: Upload Logs on Failure
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-diagnostics
          path: |
            android/build_full_log.txt
            android/app/build/outputs/
          retention-days: 7
